name: Build Release APK

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - uses: gradle/actions/setup-gradle@v3

    # 修复1：移除 -x lint，不再掩盖代码问题
    # 修复2：仅构建 arm64-v8a 架构，节省 50% 以上构建时间
    - run: gradle assembleArm64-v8aRelease

    - name: Sign app APK
      id: sign_app
      uses: ilharp/sign-android-release@nightly
      with:
        # 修复3：精确指向该架构的输出目录，签名插件100%能找到APK
        releaseDir: app/build/outputs/apk/arm64-v8a/release
        signingKey: ${{ secrets.SIGNING_KEY }}
        keyAlias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: signed-apks
        path: app/build/outputs/apk/arm64-v8a/release/*-arm64-v8a-release-signed.apk
        if-no-files-found: error
        retention-days: 20
